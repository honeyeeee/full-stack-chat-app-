services:
  backend:
    container_name: backend
    build: ./room2_back
    ports:
      - "8800:8800"
    depends_on:
      - database

  frontend:
    container_name: frontend
    build: ./room2_fromt
    ports:
      - "5173:5173"

  database:
    container_name: database
    image: bitnami/mongodb
    ports:
      - "27017:27017"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mongo_db:/bitnami/mongodb

volumes:
  mongo_db: